<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-brand" href="{{ '/' | relative_url }}">Claude 101 PL</a>
          <nav class="site-nav" aria-label="Glowna nawigacja">
            <a href="{{ '/' | relative_url }}">Spis tresci</a>
            <a href="{{ '/cca-przewodnik' | relative_url }}">CCA</a>
          </nav>
        </div>
      </header>
      <main class="page-main">
        <article class="content-card">
          {{ content }}
        </article>
      </main>
    </div>
  </body>
</html>
